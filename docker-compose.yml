networks:
  emtedad_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # 🟣 سرویس فرانت‌ند کاربران (برنامک ایتا)
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_USER_PORT:-63000}:3000" # 🌟 پورت ۶۳۰۰۰ برای برنامک ایتا
    networks:
      - emtedad_network
    depends_on:
      - backend

  # 🟠 سرویس فرانت‌ند ادمین (پنل مدیریت وب)
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_ADMIN_PORT:-63001}:3000" # 🌟 پورت ۶۳۰۰۱ برای پنل ادمین
    networks:
      - emtedad_network
    depends_on:
      - backend

  # 🟢 سرویس بک‌ند (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      # 🌟 خط ./backend:/app را پاک کن و فقط خط آپلودها رو بذار بمونه
      - ./backend/static/uploads:/app/static/uploads 
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    networks:
      - emtedad_network

  # 🔵 سرویس دیتابیس (PostgreSQL)
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=emtedad_user
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=emtedad_db
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    networks:
      - emtedad_network

  # 🔴 سرویس کش (Redis)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - emtedad_network